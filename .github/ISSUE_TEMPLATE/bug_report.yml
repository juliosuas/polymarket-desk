name: Bug report
description: Report something broken or confusing in Polymarket Desk.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve the desk. Please avoid posting secrets, private tokens, or sensitive watchlist links.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The live tape stops updating after...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Browser, device, deployment URL, API endpoint, or screenshot.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I did not include real secrets, private tokens, or sensitive watchlist URLs.
          required: true
